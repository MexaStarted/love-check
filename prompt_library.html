DATA.forEach((d,i)=>d.id=i);
let activeCat="すべて", keyword="", favOnly=false;
let favs={};try{favs=JSON.parse(localStorage.getItem("prompt_favs")||"{}");}catch(e){}

["すべて",...CATS].forEach(c=>{const b=document.createElement('div');b.className='cat'+(c==="すべて"?" on":"");b.textContent=c;

document.getElementById('favtoggle').onclick=function(){favOnly=!favOnly;this.classList.toggle('on',favOnly);render();};

const listEl=document.getElementById('list'),countEl=document.getElementById('count'),emptyEl=document.getElementById('empty');
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function render(){
  const f=DATA.filter(d=>{
    const cOk=activeCat==="すべて"||d.c===activeCat;
    const kOk=!keyword||(d.t+" "+d.c).toLowerCase().includes(keyword);

  listEl.innerHTML="";emptyEl.style.display=f.length?"none":"block";
  f.forEach(d=>{
    const div=document.createElement('div');div.className='item'+(d.x?' limited':'');
    div.innerHTML=`<div class="star ${favs[d.id]?'on':''}">${favs[d.id]?'★':'☆'}</div>
      <div class="body"><div class="meta"><span class="tag">${esc(d.c)}</span>${d.x?'<span class="lim">ツール限定</span>':''}</div><div class="txt">${esc(d.t)}</div></div>
      <button class="copy">コピー</button>`;
    const star=div.querySelector('.star');
    star.onclick=()=>{favs[d.id]=!favs[d.id];if(!favs[d.id])delete favs[d.id];saveFavs();render();};
    const cp=div.querySelector('.copy');
    cp.onclick=async()=>{try{await navigator.clipboard.writeText(d.t);}catch(e){const ta=document.createElement('textarea');ta.value=d.t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}
