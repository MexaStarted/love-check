<!DOCTYPE html>
<!--
=================================================================
  すぐ使えるVBAコード 150種 ライブラリ（HTML版）/ 特典
  検索・カテゴリ絞り込み・ワンクリックでコピーできます。
  【配布】GitHub Pages等に置きURLを記事に貼る or ファイル配布。
  【使い方】コードの「コピー」ボタン → Excelの開発タブ→Visual Basic→
   標準モジュールに貼り付け → 実行(F5)。
  ※マクロは「自分で内容を確認したコードだけ」実行してください。
   出所不明のマクロは有効化しないのが安全です。
=================================================================
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>すぐ使えるVBAコード150種ライブラリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1117;--bg2:#131a23;--panel:#161d27;--panel2:#1b2330;
    --line:#26303f;--ink:#e6edf3;--muted:#8b97a7;
    --green:#3fb950;--green2:#56d364;--accent:#2f81f7;--accent2:#58a6ff;
    --code-bg:#0b1018;--code-ink:#d6e2f0;--kw:#79c0ff;--str:#a5d6ff;--com:#8b949e;
    --body:'Zen Kaku Gothic New',sans-serif;--mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);line-height:1.7;padding-bottom:60px}
  .top{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#0d1117,rgba(13,17,23,.95));
    border-bottom:1px solid var(--line);backdrop-filter:blur(8px);padding:18px 16px 14px}
  .wrap{max-width:920px;margin:0 auto;padding:0 16px}
  h1{font-size:1.4rem;font-weight:700;display:flex;align-items:center;gap:10px}
  h1 .badge{font-family:var(--mono);font-size:.7rem;background:var(--green);color:#04130a;padding:3px 9px;border-radius:99px}
  .sub{color:var(--muted);font-size:.85rem;margin-top:4px}
  .search{margin-top:12px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);font-family:var(--body);font-size:1rem;padding:11px 14px}
  .search:focus{outline:none;border-color:var(--accent)}
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .cat{font-size:.82rem;background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:6px 13px;border-radius:99px;cursor:pointer;transition:.15s;white-space:nowrap}
  .cat:hover{border-color:var(--accent)}
  .cat.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .count{color:var(--muted);font-size:.8rem;margin:14px 0 4px}

  .item{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin:12px 0;overflow:hidden}
  .ihead{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;cursor:pointer}
  .ihead:hover{background:var(--panel2)}
  .ititle{font-weight:700;font-size:1.02rem}
  .icat{font-family:var(--mono);font-size:.68rem;color:var(--accent2);margin-top:3px}
  .idesc{color:var(--muted);font-size:.88rem;margin-top:5px}
  .copy{flex:0 0 auto;font-family:var(--body);font-size:.82rem;background:var(--panel2);border:1px solid var(--line);
    color:var(--ink);padding:8px 14px;border-radius:8px;cursor:pointer;transition:.15s;white-space:nowrap}
  .copy:hover{border-color:var(--green);color:var(--green2)}
  .copy.done{background:var(--green);color:#04130a;border-color:var(--green)}
  .code{display:none;background:var(--code-bg);border-top:1px solid var(--line);margin:0}
  .item.open .code{display:block}
  pre{font-family:var(--mono);font-size:.82rem;color:var(--code-ink);padding:16px;overflow-x:auto;white-space:pre;line-height:1.6}
  .k{color:var(--kw)}.s{color:var(--str)}.c{color:var(--com)}
  .empty{text-align:center;color:var(--muted);padding:50px 0}
  footer{color:var(--muted);font-size:.8rem;text-align:center;margin-top:30px;line-height:1.8;padding:0 16px}
</style>
</head>
<body>
<div class="top">
  <div class="wrap" style="padding:0">
    <h1>すぐ使えるVBAコード <span class="badge">150種</span></h1>
    <div class="sub">検索 or カテゴリで絞り込み →「コピー」でコードをコピー → Excelの標準モジュールに貼って実行(F5)</div>
    <input class="search" id="search" placeholder="🔍 やりたいことで検索（例: 重複, 最終行, PDF, 色, CSV）">
    <div class="cats" id="cats"></div>
  </div>
</div>
<div class="wrap">
  <div class="count" id="count"></div>
  <div id="list"></div>
  <div class="empty" id="empty" style="display:none">該当するコードがありません。別のキーワードで試してみてください。</div>
</div>

<footer>
  ※マクロは必ず内容を確認してから実行してください。出所不明のファイルのマクロは有効化しないのが安全です。<br>
  パスは環境に合わせて書き換えてください（例: C:\temp\…）。一部は雛形なので「'--- 処理 ---」部分を編集して使います。
</footer>

<script>
const DATA = [{"cat": "セル・範囲操作", "title": "選択範囲をクリア", "desc": "選択中のセルの値だけを消去（書式は残す）。", "code": "Sub ClearValues()\n    Selection.ClearContents\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "選択範囲を完全クリア", "desc": "値・書式・コメントすべて消去。", "code": "Sub ClearAll()\n    Selection.Clear\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "アクティブセルに値を入れる", "desc": "現在のセルに文字を書き込む。", "code": "Sub SetValue()\n    ActiveCell.Value = \"こんにちは\"\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "A1に移動", "desc": "シート先頭へジャンプ。", "code": "Sub GotoA1()\n    Range(\"A1\").Select\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "最終行を取得", "desc": "A列の最終行番号を表示。", "code": "Sub LastRow()\n    Dim r As Long\n    r = Cells(Rows.Count, 1).End(xlUp).Row\n    MsgBox \"最終行: \" & r\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "最終列を取得", "desc": "1行目の最終列番号を表示。", "code": "Sub LastCol()\n    Dim c As Long\n    c = Cells(1, Columns.Count).End(xlToLeft).Column\n    MsgBox \"最終列: \" & c\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "選択範囲をコピー", "desc": "選択をクリップボードへ。", "code": "Sub CopySel()\n    Selection.Copy\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "値だけ貼り付け", "desc": "コピー後、値のみ貼り付け。", "code": "Sub PasteValues()\n    Selection.PasteSpecial Paste:=xlPasteValues\n    Application.CutCopyMode = False\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "数式を値に変換", "desc": "選択範囲の数式を計算結果で固定。", "code": "Sub FormulaToValue()\n    Selection.Value = Selection.Value\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "空白セルを詰める", "desc": "選択範囲の空白行を削除。", "code": "Sub DeleteBlankRows()\n    On Error Resume Next\n    Selection.SpecialCells(xlCellTypeBlanks).EntireRow.Delete\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "重複を削除", "desc": "A列基準で重複行を削除。", "code": "Sub RemoveDup()\n    ActiveSheet.Range(\"A1\").CurrentRegion.RemoveDuplicates Columns:=1, Header:=xlYes\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "範囲に連番を振る", "desc": "選択範囲に1から連番。", "code": "Sub FillSerial()\n    Dim i As Long, c As Range\n    i = 1\n    For Each c In Selection\n        c.Value = i\n        i = i + 1\n    Next c\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "選択範囲を合計してメッセージ", "desc": "合計値をポップアップ。", "code": "Sub SumSel()\n    MsgBox \"合計: \" & Application.Sum(Selection)\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "セルを結合", "desc": "選択範囲を結合して中央揃え。", "code": "Sub MergeCenter()\n    With Selection\n        .Merge\n        .HorizontalAlignment = xlCenter\n    End With\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "結合を解除", "desc": "選択範囲の結合を解除。", "code": "Sub UnMerge()\n    Selection.UnMerge\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "行を挿入", "desc": "アクティブ行の上に1行挿入。", "code": "Sub InsertRow()\n    ActiveCell.EntireRow.Insert\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "列を挿入", "desc": "アクティブ列の左に1列挿入。", "code": "Sub InsertCol()\n    ActiveCell.EntireColumn.Insert\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "選択行を削除", "desc": "アクティブ行を削除。", "code": "Sub DeleteRow()\n    ActiveCell.EntireRow.Delete\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "文字を置換", "desc": "選択範囲内の文字を置換。", "code": "Sub ReplaceText()\n    Selection.Replace What:=\"旧\", Replacement:=\"新\", LookAt:=xlPart\nEnd Sub"}, {"cat": "セル・範囲操作", "title": "前後の空白を削除", "desc": "選択範囲の各セルをTrim。", "code": "Sub TrimCells()\n    Dim c As Range\n    For Each c In Selection\n        If Not IsEmpty(c) Then c.Value = Trim(c.Value)\n    Next c\nEnd Sub"}, {"cat": "シート操作", "title": "新しいシートを追加", "desc": "末尾にシートを1枚追加。", "code": "Sub AddSheet()\n    Sheets.Add After:=Sheets(Sheets.Count)\nEnd Sub"}, {"cat": "シート操作", "title": "シート名を変更", "desc": "アクティブシートの名前を変更。", "code": "Sub RenameSheet()\n    ActiveSheet.Name = \"新しい名前\"\nEnd Sub"}, {"cat": "シート操作", "title": "シートを削除（確認なし）", "desc": "確認ダイアログを出さず削除。", "code": "Sub DeleteSheet()\n    Application.DisplayAlerts = False\n    ActiveSheet.Delete\n    Application.DisplayAlerts = True\nEnd Sub"}, {"cat": "シート操作", "title": "全シート名を一覧表示", "desc": "新規シートに全シート名を書き出す。", "code": "Sub ListSheets()\n    Dim ws As Worksheet, i As Long\n    i = 1\n    For Each ws In Worksheets\n        Cells(i, 1).Value = ws.Name\n        i = i + 1\n    Next ws\nEnd Sub"}, {"cat": "シート操作", "title": "シートをコピー", "desc": "アクティブシートを複製。", "code": "Sub CopySheet()\n    ActiveSheet.Copy After:=Sheets(Sheets.Count)\nEnd Sub"}, {"cat": "シート操作", "title": "指定シートへ移動", "desc": "名前を指定してシートを選択。", "code": "Sub GotoSheet()\n    Sheets(\"Sheet1\").Activate\nEnd Sub"}, {"cat": "シート操作", "title": "全シートを保護", "desc": "パスワードなしで全シート保護。", "code": "Sub ProtectAll()\n    Dim ws As Worksheet\n    For Each ws In Worksheets\n        ws.Protect\n    Next ws\nEnd Sub"}, {"cat": "シート操作", "title": "全シートの保護解除", "desc": "全シートの保護を外す。", "code": "Sub UnprotectAll()\n    Dim ws As Worksheet\n    For Each ws In Worksheets\n        ws.Unprotect\n    Next ws\nEnd Sub"}, {"cat": "シート操作", "title": "シートを名前順に並べ替え", "desc": "シートタブをABC順に整列。", "code": "Sub SortSheets()\n    Dim i As Long, j As Long\n    For i = 1 To Sheets.Count - 1\n        For j = i + 1 To Sheets.Count\n            If Sheets(j).Name < Sheets(i).Name Then\n                Sheets(j).Move Before:=Sheets(i)\n            End If\n        Next j\n    Next i\nEnd Sub"}, {"cat": "シート操作", "title": "非表示シートを再表示", "desc": "すべてのシートを表示状態に。", "code": "Sub ShowAllSheets()\n    Dim ws As Worksheet\n    For Each ws In Worksheets\n        ws.Visible = xlSheetVisible\n    Next ws\nEnd Sub"}, {"cat": "シート操作", "title": "シートを非表示", "desc": "アクティブシートを隠す。", "code": "Sub HideSheet()\n    ActiveSheet.Visible = xlSheetHidden\nEnd Sub"}, {"cat": "シート操作", "title": "シートの色を変える", "desc": "タブの色を赤に。", "code": "Sub TabColor()\n    ActiveSheet.Tab.Color = RGB(255, 0, 0)\nEnd Sub"}, {"cat": "シート操作", "title": "全シートのA1を選択", "desc": "各シートのカーソルをA1へ。", "code": "Sub HomeAll()\n    Dim ws As Worksheet\n    For Each ws In Worksheets\n        ws.Activate\n        Range(\"A1\").Select\n    Next ws\n    Sheets(1).Activate\nEnd Sub"}, {"cat": "シート操作", "title": "使われていないシートを削除", "desc": "空のシートをまとめて削除。", "code": "Sub DeleteEmptySheets()\n    Dim ws As Worksheet\n    Application.DisplayAlerts = False\n    For Each ws In Worksheets\n        If Application.CountA(ws.UsedRange) = 0 And Worksheets.Count > 1 Then ws.Delete\n    Next ws\n    Application.DisplayAlerts = True\nEnd Sub"}, {"cat": "シート操作", "title": "シート数を数える", "desc": "ブック内のシート枚数を表示。", "code": "Sub CountSheets()\n    MsgBox \"シート数: \" & Worksheets.Count\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "ブックを保存", "desc": "上書き保存。", "code": "Sub SaveBook()\n    ThisWorkbook.Save\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "名前を付けて保存", "desc": "パスを指定して保存。", "code": "Sub SaveAs()\n    ThisWorkbook.SaveAs \"C:\\\\temp\\\\book1.xlsx\"\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "新しいブックを作成", "desc": "空のブックを開く。", "code": "Sub NewBook()\n    Workbooks.Add\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "ブックを閉じる（保存して）", "desc": "保存して閉じる。", "code": "Sub CloseBook()\n    ThisWorkbook.Close SaveChanges:=True\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "指定ファイルを開く", "desc": "パスのブックを開く。", "code": "Sub OpenBook()\n    Workbooks.Open \"C:\\\\temp\\\\data.xlsx\"\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "PDFで書き出し", "desc": "アクティブシートをPDF出力。", "code": "Sub ExportPDF()\n    ActiveSheet.ExportAsFixedFormat Type:=xlTypePDF, Filename:=\"C:\\\\temp\\\\out.pdf\"\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "バックアップを作る", "desc": "日付付きでコピー保存。", "code": "Sub Backup()\n    ThisWorkbook.SaveCopyAs \"C:\\\\temp\\\\backup_\" & Format(Now, \"yyyymmdd\") & \".xlsx\"\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "ファイル名を取得", "desc": "現在のブック名を表示。", "code": "Sub BookName()\n    MsgBox ThisWorkbook.Name\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "フォルダパスを取得", "desc": "保存先フォルダを表示。", "code": "Sub BookPath()\n    MsgBox ThisWorkbook.Path\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "フォルダ内のファイル一覧", "desc": "指定フォルダのファイル名を列挙。", "code": "Sub ListFiles()\n    Dim f As String, i As Long\n    f = Dir(\"C:\\\\temp\\\\*.*\")\n    i = 1\n    Do While f <> \"\"\n        Cells(i, 1).Value = f\n        i = i + 1\n        f = Dir\n    Loop\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "全ブックを保存", "desc": "開いている全ブックを保存。", "code": "Sub SaveAllBooks()\n    Dim wb As Workbook\n    For Each wb In Workbooks\n        wb.Save\n    Next wb\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "読み取り専用で開く", "desc": "ファイルを編集不可で開く。", "code": "Sub OpenReadOnly()\n    Workbooks.Open Filename:=\"C:\\\\temp\\\\data.xlsx\", ReadOnly:=True\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "CSVとして保存", "desc": "シートをCSV出力。", "code": "Sub SaveCSV()\n    ActiveWorkbook.SaveAs \"C:\\\\temp\\\\out.csv\", xlCSV\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "フォルダを作成", "desc": "新規フォルダを作る。", "code": "Sub MakeFolder()\n    If Dir(\"C:\\\\temp\\\\new\", vbDirectory) = \"\" Then MkDir \"C:\\\\temp\\\\new\"\nEnd Sub"}, {"cat": "ブック・ファイル操作", "title": "ファイルの存在チェック", "desc": "あるか確認してメッセージ。", "code": "Sub FileExists()\n    If Dir(\"C:\\\\temp\\\\data.xlsx\") <> \"\" Then\n        MsgBox \"あります\"\n    Else\n        MsgBox \"ありません\"\n    End If\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "全角を半角に変換", "desc": "選択範囲を半角化。", "code": "Sub ToHankaku()\n    Dim c As Range\n    For Each c In Selection\n        c.Value = StrConv(c.Value, vbNarrow)\n    Next c\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "半角を全角に変換", "desc": "選択範囲を全角化。", "code": "Sub ToZenkaku()\n    Dim c As Range\n    For Each c In Selection\n        c.Value = StrConv(c.Value, vbWide)\n    Next c\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "大文字に変換", "desc": "英字を大文字へ。", "code": "Sub ToUpper()\n    Dim c As Range\n    For Each c In Selection\n        c.Value = UCase(c.Value)\n    Next c\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "小文字に変換", "desc": "英字を小文字へ。", "code": "Sub ToLower()\n    Dim c As Range\n    For Each c In Selection\n        c.Value = LCase(c.Value)\n    Next c\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "余分なスペースを除去", "desc": "連続スペースを1つに（簡易Trim）。", "code": "Sub CleanSpaces()\n    Dim c As Range\n    For Each c In Selection\n        c.Value = Application.Trim(c.Value)\n    Next c\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "改行を削除", "desc": "セル内の改行を消す。", "code": "Sub RemoveLineBreaks()\n    Dim c As Range\n    For Each c In Selection\n        c.Value = Replace(c.Value, vbLf, \"\")\n    Next c\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "数値文字列を数値に", "desc": "文字列の数字を本物の数値に。", "code": "Sub TextToNumber()\n    Dim c As Range\n    For Each c In Selection\n        If IsNumeric(c.Value) Then c.Value = CDbl(c.Value)\n    Next c\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "先頭ゼロを付ける", "desc": "4桁ゼロ埋め（例:0042）。", "code": "Sub PadZero()\n    Dim c As Range\n    For Each c In Selection\n        c.Value = Format(c.Value, \"0000\")\n    Next c\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "日付の表記を統一", "desc": "yyyy/mm/dd形式に揃える。", "code": "Sub NormalizeDate()\n    Dim c As Range\n    For Each c In Selection\n        If IsDate(c.Value) Then c.Value = Format(c.Value, \"yyyy/mm/dd\")\n    Next c\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "全角数字を半角数字に", "desc": "数字だけ半角化。", "code": "Sub NumToHankaku()\n    Dim c As Range\n    For Each c In Selection\n        c.Value = StrConv(c.Value, vbNarrow)\n    Next c\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "空白セルを0で埋める", "desc": "空欄に0を入れる。", "code": "Sub FillZero()\n    Dim c As Range\n    For Each c In Selection\n        If IsEmpty(c) Then c.Value = 0\n    Next c\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "指定文字を含む行を削除", "desc": "A列に「削除」を含む行を消す。", "code": "Sub DeleteRowsByWord()\n    Dim r As Long\n    For r = Cells(Rows.Count, 1).End(xlUp).Row To 1 Step -1\n        If InStr(Cells(r, 1).Value, \"削除\") > 0 Then Rows(r).Delete\n    Next r\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "姓名を分割", "desc": "A列「姓 名」をB・C列へ分割。", "code": "Sub SplitName()\n    Dim r As Long, p() As String\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        p = Split(Cells(r, 1).Value, \" \")\n        If UBound(p) >= 1 Then\n            Cells(r, 2).Value = p(0)\n            Cells(r, 3).Value = p(1)\n        End If\n    Next r\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "列を結合", "desc": "A・B列をC列に結合。", "code": "Sub ConcatCols()\n    Dim r As Long\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        Cells(r, 3).Value = Cells(r, 1).Value & Cells(r, 2).Value\n    Next r\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "特定文字を抜き出す", "desc": "「-」の前を取り出しB列へ。", "code": "Sub ExtractBefore()\n    Dim r As Long, p As Long\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        p = InStr(Cells(r, 1).Value, \"-\")\n        If p > 0 Then Cells(r, 2).Value = Left(Cells(r, 1).Value, p - 1)\n    Next r\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "カンマ区切りを分割", "desc": "A列をカンマで各列に分解。", "code": "Sub SplitByComma()\n    Dim r As Long, p() As String, i As Long\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        p = Split(Cells(r, 1).Value, \",\")\n        For i = 0 To UBound(p)\n            Cells(r, i + 2).Value = p(i)\n        Next i\n    Next r\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "重複に色を付ける", "desc": "A列の重複を黄色に。", "code": "Sub HighlightDup()\n    Dim r As Long, dic As Object\n    Set dic = CreateObject(\"Scripting.Dictionary\")\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        If dic.exists(Cells(r, 1).Value) Then\n            Cells(r, 1).Interior.Color = vbYellow\n        Else\n            dic.Add Cells(r, 1).Value, 1\n        End If\n    Next r\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "空行を一括削除", "desc": "使用範囲の空行をすべて削除。", "code": "Sub DeleteAllBlankRows()\n    Dim r As Long\n    For r = Cells(Rows.Count, 1).End(xlUp).Row To 1 Step -1\n        If Application.CountA(Rows(r)) = 0 Then Rows(r).Delete\n    Next r\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "文字数をカウント", "desc": "B列に各セルの文字数。", "code": "Sub CountChars()\n    Dim r As Long\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        Cells(r, 2).Value = Len(Cells(r, 1).Value)\n    Next r\nEnd Sub"}, {"cat": "データ整形・クリーニング", "title": "記号を除去", "desc": "ハイフンとスペースを消す。", "code": "Sub RemoveSymbols()\n    Dim c As Range\n    For Each c In Selection\n        c.Value = Replace(Replace(c.Value, \"-\", \"\"), \" \", \"\")\n    Next c\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "オートフィルタを設定", "desc": "現在の表にフィルタを付ける。", "code": "Sub SetFilter()\n    ActiveSheet.Range(\"A1\").CurrentRegion.AutoFilter\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "フィルタを解除", "desc": "オートフィルタを外す。", "code": "Sub ClearFilter()\n    If ActiveSheet.AutoFilterMode Then ActiveSheet.AutoFilterMode = False\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "条件で抽出", "desc": "A列が「東京」の行だけ表示。", "code": "Sub FilterTokyo()\n    ActiveSheet.Range(\"A1\").CurrentRegion.AutoFilter Field:=1, Criteria1:=\"東京\"\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "値を検索して選択", "desc": "A列で「目標」を探して選択。", "code": "Sub FindValue()\n    Dim f As Range\n    Set f = Columns(1).Find(What:=\"目標\", LookAt:=xlWhole)\n    If Not f Is Nothing Then f.Select Else MsgBox \"見つかりません\"\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "該当件数を数える", "desc": "A列の「OK」の数を表示。", "code": "Sub CountIfOK()\n    MsgBox \"OK件数: \" & Application.CountIf(Columns(1), \"OK\")\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "VLOOKUP相当の検索", "desc": "A列を探してB列の値を返す関数。", "code": "Function MyLookup(key As String) As Variant\n    Dim f As Range\n    Set f = Columns(1).Find(What:=key, LookAt:=xlWhole)\n    If Not f Is Nothing Then MyLookup = f.Offset(0, 1).Value\nEnd Function"}, {"cat": "検索・抽出・フィルタ", "title": "色付きセルを数える", "desc": "選択範囲の黄色セルを数える。", "code": "Sub CountYellow()\n    Dim c As Range, n As Long\n    For Each c In Selection\n        If c.Interior.Color = vbYellow Then n = n + 1\n    Next c\n    MsgBox \"黄色: \" & n\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "最大値の位置を探す", "desc": "A列の最大値セルを選択。", "code": "Sub FindMax()\n    Dim rng As Range\n    Set rng = Range(\"A1\", Cells(Rows.Count, 1).End(xlUp))\n    rng.Find(Application.Max(rng)).Select\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "条件付きで合計", "desc": "B列が100超のA列を合計。", "code": "Sub SumIfOver()\n    MsgBox Application.SumIf(Columns(2), \">100\", Columns(1))\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "重複なしリスト作成", "desc": "A列の一意な値をC列へ。", "code": "Sub UniqueList()\n    Dim r As Long, dic As Object, k\n    Set dic = CreateObject(\"Scripting.Dictionary\")\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        dic(Cells(r, 1).Value) = 1\n    Next r\n    r = 1\n    For Each k In dic.keys\n        Cells(r, 3).Value = k\n        r = r + 1\n    Next k\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "フィルタ後の表示行を数える", "desc": "抽出されている行数を表示。", "code": "Sub CountVisible()\n    MsgBox Application.Subtotal(103, Columns(1)) - 1\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "特定行を別シートへ抽出", "desc": "A列「対象」の行をSheet2へコピー。", "code": "Sub ExtractToSheet()\n    Dim r As Long, n As Long\n    n = 1\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        If Cells(r, 1).Value = \"対象\" Then\n            Rows(r).Copy Sheets(\"Sheet2\").Rows(n)\n            n = n + 1\n        End If\n    Next r\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "あいまい検索", "desc": "「田」を含むセルを黄色に。", "code": "Sub PartialMatch()\n    Dim c As Range\n    For Each c In Range(\"A1\", Cells(Rows.Count, 1).End(xlUp))\n        If InStr(c.Value, \"田\") > 0 Then c.Interior.Color = vbYellow\n    Next c\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "並べ替え（昇順）", "desc": "A列を昇順ソート。", "code": "Sub SortAsc()\n    ActiveSheet.Range(\"A1\").CurrentRegion.Sort Key1:=Range(\"A1\"), Order1:=xlAscending, Header:=xlYes\nEnd Sub"}, {"cat": "検索・抽出・フィルタ", "title": "並べ替え（降順）", "desc": "B列を降順ソート。", "code": "Sub SortDesc()\n    ActiveSheet.Range(\"A1\").CurrentRegion.Sort Key1:=Range(\"B1\"), Order1:=xlDescending, Header:=xlYes\nEnd Sub"}, {"cat": "書式・見た目", "title": "太字にする", "desc": "選択範囲を太字に。", "code": "Sub MakeBold()\n    Selection.Font.Bold = True\nEnd Sub"}, {"cat": "書式・見た目", "title": "文字色を赤に", "desc": "選択範囲の文字を赤色。", "code": "Sub RedFont()\n    Selection.Font.Color = vbRed\nEnd Sub"}, {"cat": "書式・見た目", "title": "背景色を黄色に", "desc": "選択範囲を黄色塗り。", "code": "Sub YellowFill()\n    Selection.Interior.Color = vbYellow\nEnd Sub"}, {"cat": "書式・見た目", "title": "罫線を引く", "desc": "選択範囲に格子線。", "code": "Sub AddBorders()\n    Selection.Borders.LineStyle = xlContinuous\nEnd Sub"}, {"cat": "書式・見た目", "title": "罫線を消す", "desc": "選択範囲の罫線を削除。", "code": "Sub RemoveBorders()\n    Selection.Borders.LineStyle = xlNone\nEnd Sub"}, {"cat": "書式・見た目", "title": "中央揃え", "desc": "水平・垂直とも中央に。", "code": "Sub CenterAlign()\n    With Selection\n        .HorizontalAlignment = xlCenter\n        .VerticalAlignment = xlCenter\n    End With\nEnd Sub"}, {"cat": "書式・見た目", "title": "フォントサイズを変更", "desc": "選択範囲を14ptに。", "code": "Sub FontSize14()\n    Selection.Font.Size = 14\nEnd Sub"}, {"cat": "書式・見た目", "title": "列幅を自動調整", "desc": "選択列の幅を最適化。", "code": "Sub AutoFitCols()\n    Selection.EntireColumn.AutoFit\nEnd Sub"}, {"cat": "書式・見た目", "title": "行の高さを自動調整", "desc": "選択行の高さを最適化。", "code": "Sub AutoFitRows()\n    Selection.EntireRow.AutoFit\nEnd Sub"}, {"cat": "書式・見た目", "title": "3桁区切り", "desc": "数値にカンマ書式。", "code": "Sub CommaFormat()\n    Selection.NumberFormat = \"#,##0\"\nEnd Sub"}, {"cat": "書式・見た目", "title": "パーセント表示", "desc": "選択範囲を％書式に。", "code": "Sub PercentFormat()\n    Selection.NumberFormat = \"0.0%\"\nEnd Sub"}, {"cat": "書式・見た目", "title": "円通貨表示", "desc": "選択範囲を¥書式に。", "code": "Sub YenFormat()\n    Selection.NumberFormat = \"¥#,##0\"\nEnd Sub"}, {"cat": "書式・見た目", "title": "書式をすべてクリア", "desc": "選択範囲の書式を初期化。", "code": "Sub ClearFormats()\n    Selection.ClearFormats\nEnd Sub"}, {"cat": "書式・見た目", "title": "一行おきに色を付ける", "desc": "選択範囲を縞模様に。", "code": "Sub ZebraStripes()\n    Dim r As Long\n    For r = 1 To Selection.Rows.Count\n        If r Mod 2 = 0 Then Selection.Rows(r).Interior.Color = RGB(235, 245, 255)\n    Next r\nEnd Sub"}, {"cat": "書式・見た目", "title": "条件で色分け", "desc": "選択範囲で負の数を赤背景に。", "code": "Sub ColorNegatives()\n    Dim c As Range\n    For Each c In Selection\n        If IsNumeric(c.Value) Then\n            If c.Value < 0 Then c.Interior.Color = RGB(255, 200, 200)\n        End If\n    Next c\nEnd Sub"}, {"cat": "集計・計算", "title": "合計を下に追加", "desc": "A列の合計を最終行の下に。", "code": "Sub AddTotal()\n    Dim r As Long\n    r = Cells(Rows.Count, 1).End(xlUp).Row\n    Cells(r + 1, 1).Value = Application.Sum(Range(\"A1:A\" & r))\nEnd Sub"}, {"cat": "集計・計算", "title": "平均を求める", "desc": "選択範囲の平均を表示。", "code": "Sub AvgSel()\n    MsgBox \"平均: \" & Application.Average(Selection)\nEnd Sub"}, {"cat": "集計・計算", "title": "最大・最小を表示", "desc": "選択範囲の最大と最小。", "code": "Sub MaxMin()\n    MsgBox \"最大:\" & Application.Max(Selection) & \" 最小:\" & Application.Min(Selection)\nEnd Sub"}, {"cat": "集計・計算", "title": "消費税を計算", "desc": "B列にA列×1.1を入れる。", "code": "Sub AddTax()\n    Dim r As Long\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        If IsNumeric(Cells(r, 1).Value) Then Cells(r, 2).Value = Cells(r, 1).Value * 1.1\n    Next r\nEnd Sub"}, {"cat": "集計・計算", "title": "累計を作る", "desc": "A列の累計をB列へ。", "code": "Sub RunningTotal()\n    Dim r As Long, t As Double\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        t = t + Cells(r, 1).Value\n        Cells(r, 2).Value = t\n    Next r\nEnd Sub"}, {"cat": "集計・計算", "title": "構成比を計算", "desc": "A列の各値÷合計をB列へ。", "code": "Sub Ratio()\n    Dim r As Long, s As Double\n    s = Application.Sum(Columns(1))\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        Cells(r, 2).Value = Cells(r, 1).Value / s\n    Next r\nEnd Sub"}, {"cat": "集計・計算", "title": "四捨五入", "desc": "B列にA列を四捨五入。", "code": "Sub RoundCol()\n    Dim r As Long\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        Cells(r, 2).Value = Application.Round(Cells(r, 1).Value, 0)\n    Next r\nEnd Sub"}, {"cat": "集計・計算", "title": "件数をカウント", "desc": "A列の入力済みセル数。", "code": "Sub CountA()\n    MsgBox \"件数: \" & Application.CountA(Columns(1))\nEnd Sub"}, {"cat": "集計・計算", "title": "中央値を表示", "desc": "選択範囲の中央値。", "code": "Sub Median()\n    MsgBox \"中央値: \" & Application.Median(Selection)\nEnd Sub"}, {"cat": "集計・計算", "title": "標準偏差を表示", "desc": "選択範囲の標準偏差。", "code": "Sub StdevSel()\n    MsgBox \"標準偏差: \" & Application.StDev(Selection)\nEnd Sub"}, {"cat": "集計・計算", "title": "前月比を計算", "desc": "A列(今月)とB列(先月)からC列に比率。", "code": "Sub MoM()\n    Dim r As Long\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        If Cells(r, 2).Value <> 0 Then Cells(r, 3).Value = Cells(r, 1).Value / Cells(r, 2).Value - 1\n    Next r\nEnd Sub"}, {"cat": "集計・計算", "title": "小計を入れる", "desc": "データの区切りごとに小計（簡易）。", "code": "Sub SubTotalQuick()\n    ActiveSheet.Range(\"A1\").CurrentRegion.Subtotal GroupBy:=1, Function:=xlSum, TotalList:=Array(2)\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "処理を高速化する枠", "desc": "画面更新オフで処理を囲む雛形。", "code": "Sub FastProcess()\n    Application.ScreenUpdating = False\n    Application.Calculation = xlCalculationManual\n    '--- ここに処理 ---\n    Application.Calculation = xlCalculationAutomatic\n    Application.ScreenUpdating = True\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "全行をループ処理", "desc": "最終行までループする雛形。", "code": "Sub LoopRows()\n    Dim r As Long, last As Long\n    last = Cells(Rows.Count, 1).End(xlUp).Row\n    For r = 1 To last\n        '--- Cells(r, 1) に対する処理 ---\n    Next r\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "全シートをループ", "desc": "各シートに同じ処理を行う雛形。", "code": "Sub LoopSheets()\n    Dim ws As Worksheet\n    For Each ws In Worksheets\n        '--- ws に対する処理 ---\n    Next ws\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "確認してから実行", "desc": "Yes/Noで処理を分岐。", "code": "Sub ConfirmRun()\n    If MsgBox(\"実行しますか?\", vbYesNo) = vbYes Then\n        MsgBox \"実行しました\"\n    End If\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "進捗をステータスバーに", "desc": "処理中の進捗を表示。", "code": "Sub ShowProgress()\n    Dim i As Long\n    For i = 1 To 100\n        Application.StatusBar = \"処理中... \" & i & \"%\"\n        '--- 処理 ---\n    Next i\n    Application.StatusBar = False\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "一定時間待つ", "desc": "2秒待機してから続行。", "code": "Sub WaitTwoSec()\n    Application.Wait Now + TimeValue(\"00:00:02\")\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "今日の日付を入れる", "desc": "アクティブセルに本日の日付。", "code": "Sub Today()\n    ActiveCell.Value = Date\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "現在時刻を入れる", "desc": "アクティブセルに現在時刻。", "code": "Sub NowTime()\n    ActiveCell.Value = Now\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "エラーを無視して続行", "desc": "エラーで止めない雛形。", "code": "Sub IgnoreErrors()\n    On Error Resume Next\n    '--- 処理 ---\n    On Error GoTo 0\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "エラー処理つき雛形", "desc": "エラー時にメッセージを出す。", "code": "Sub WithErrorHandler()\n    On Error GoTo ErrH\n    '--- 処理 ---\n    Exit Sub\nErrH:\n    MsgBox \"エラー: \" & Err.Description\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "複数マクロを連続実行", "desc": "他のマクロを順に呼び出す。", "code": "Sub RunAll()\n    Call ClearFilter\n    Call SortAsc\n    Call AutoFitCols\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "指定回数ループ", "desc": "10回繰り返す雛形。", "code": "Sub LoopN()\n    Dim i As Long\n    For i = 1 To 10\n        Debug.Print i\n    Next i\nEnd Sub"}, {"cat": "自動化・繰り返し", "title": "条件を満たすまで繰り返す", "desc": "Do Whileの雛形。", "code": "Sub DoWhileSample()\n    Dim r As Long\n    r = 1\n    Do While Cells(r, 1).Value <> \"\"\n        '--- 処理 ---\n        r = r + 1\n    Loop\nEnd Sub"}, {"cat": "インポート・エクスポート", "title": "CSVを読み込む", "desc": "CSVの内容をシートに取り込む（簡易）。", "code": "Sub ImportCSV()\n    Dim f As Integer, line As String, r As Long, p() As String, i As Long\n    f = FreeFile\n    Open \"C:\\\\temp\\\\data.csv\" For Input As #f\n    r = 1\n    Do Until EOF(f)\n        Line Input #f, line\n        p = Split(line, \",\")\n        For i = 0 To UBound(p)\n            Cells(r, i + 1).Value = p(i)\n        Next i\n        r = r + 1\n    Loop\n    Close #f\nEnd Sub"}, {"cat": "インポート・エクスポート", "title": "シートをCSVに書き出す", "desc": "使用範囲をCSV保存（簡易）。", "code": "Sub ExportCSV()\n    Dim f As Integer, r As Long, c As Long, line As String\n    f = FreeFile\n    Open \"C:\\\\temp\\\\out.csv\" For Output As #f\n    For r = 1 To ActiveSheet.UsedRange.Rows.Count\n        line = \"\"\n        For c = 1 To ActiveSheet.UsedRange.Columns.Count\n            line = line & Cells(r, c).Value & IIf(c < ActiveSheet.UsedRange.Columns.Count, \",\", \"\")\n        Next c\n        Print #f, line\n    Next r\n    Close #f\nEnd Sub"}, {"cat": "インポート・エクスポート", "title": "テキストファイルに書き出す", "desc": "A列の内容をtxtに保存。", "code": "Sub ExportText()\n    Dim f As Integer, r As Long\n    f = FreeFile\n    Open \"C:\\\\temp\\\\out.txt\" For Output As #f\n    For r = 1 To Cells(Rows.Count, 1).End(xlUp).Row\n        Print #f, Cells(r, 1).Value\n    Next r\n    Close #f\nEnd Sub"}, {"cat": "インポート・エクスポート", "title": "テキストを読み込む", "desc": "txtの各行をA列に。", "code": "Sub ImportText()\n    Dim f As Integer, line As String, r As Long\n    f = FreeFile\n    Open \"C:\\\\temp\\\\in.txt\" For Input As #f\n    r = 1\n    Do Until EOF(f)\n        Line Input #f, line\n        Cells(r, 1).Value = line\n        r = r + 1\n    Loop\n    Close #f\nEnd Sub"}, {"cat": "インポート・エクスポート", "title": "別ブックの値を取り込む", "desc": "他ファイルのA1をコピー。", "code": "Sub ImportFromBook()\n    Dim wb As Workbook\n    Set wb = Workbooks.Open(\"C:\\\\temp\\\\src.xlsx\")\n    ThisWorkbook.Sheets(1).Range(\"A1\").Value = wb.Sheets(1).Range(\"A1\").Value\n    wb.Close False\nEnd Sub"}, {"cat": "インポート・エクスポート", "title": "範囲を画像でコピー", "desc": "選択範囲を図としてコピー。", "code": "Sub CopyAsPicture()\n    Selection.CopyPicture Appearance:=xlScreen, Format:=xlPicture\nEnd Sub"}, {"cat": "インポート・エクスポート", "title": "全シートを個別ファイルに", "desc": "各シートを別ブックで保存。", "code": "Sub SplitSheets()\n    Dim ws As Worksheet\n    For Each ws In Worksheets\n        ws.Copy\n        ActiveWorkbook.SaveAs \"C:\\\\temp\\\\\" & ws.Name & \".xlsx\"\n        ActiveWorkbook.Close False\n    Next ws\nEnd Sub"}, {"cat": "インポート・エクスポート", "title": "複数CSVを1シートに結合", "desc": "フォルダ内CSVをまとめて読み込み（簡易）。", "code": "Sub MergeCSVs()\n    Dim f As String, r As Long\n    r = 1\n    f = Dir(\"C:\\\\temp\\\\*.csv\")\n    Do While f <> \"\"\n        Cells(r, 1).Value = f   '実装例: ファイル名を記録\n        r = r + 1\n        f = Dir\n    Loop\nEnd Sub"}, {"cat": "インポート・エクスポート", "title": "印刷する", "desc": "アクティブシートを印刷。", "code": "Sub PrintSheet()\n    ActiveSheet.PrintOut\nEnd Sub"}, {"cat": "インポート・エクスポート", "title": "印刷プレビュー", "desc": "印刷前にプレビュー表示。", "code": "Sub PrintPreview()\n    ActiveSheet.PrintPreview\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "選択範囲をメールで送る雛形", "desc": "Outlook経由で送る雛形（要Outlook）。", "code": "Sub SendMail()\n    Dim ol As Object, mail As Object\n    Set ol = CreateObject(\"Outlook.Application\")\n    Set mail = ol.CreateItem(0)\n    mail.To = \"to@example.com\"\n    mail.Subject = \"件名\"\n    mail.Body = \"本文\"\n    mail.Display   ' .Send にすると即送信\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "セルの内容を読み上げ", "desc": "選択セルを音声で読み上げ。", "code": "Sub SpeakCell()\n    Application.Speech.Speak ActiveCell.Value\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "電卓を開く", "desc": "Windowsの電卓を起動。", "code": "Sub OpenCalc()\n    Shell \"calc.exe\", vbNormalFocus\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "今の時刻であいさつ", "desc": "時間帯でメッセージを変える。", "code": "Sub Greeting()\n    Dim h As Integer\n    h = Hour(Now)\n    If h < 11 Then\n        MsgBox \"おはよう\"\n    ElseIf h < 18 Then\n        MsgBox \"こんにちは\"\n    Else\n        MsgBox \"こんばんは\"\n    End If\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "サイコロを振る", "desc": "1〜6の乱数をセルに。", "code": "Sub Dice()\n    ActiveCell.Value = Int(Rnd * 6) + 1\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "くじ引き", "desc": "選択範囲からランダムに1つ選ぶ。", "code": "Sub Lottery()\n    Dim n As Long\n    n = Int(Rnd * Selection.Cells.Count) + 1\n    MsgBox \"当選: \" & Selection.Cells(n).Value\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "ストップウォッチ", "desc": "処理時間を計測する雛形。", "code": "Sub StopWatch()\n    Dim t As Double\n    t = Timer\n    '--- 処理 ---\n    MsgBox \"経過: \" & Format(Timer - t, \"0.00\") & \"秒\"\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "セルにハイパーリンク", "desc": "A1にリンクを設定。", "code": "Sub AddLink()\n    ActiveSheet.Hyperlinks.Add Anchor:=Range(\"A1\"), Address:=\"https://example.com\", TextToDisplay:=\"リンク\"\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "コメントを追加", "desc": "アクティブセルにメモを付ける。", "code": "Sub AddComment()\n    ActiveCell.AddComment \"メモです\"\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "全コメント削除", "desc": "シート内のコメントを全消去。", "code": "Sub ClearComments()\n    Cells.ClearComments\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "選択範囲をシャッフル", "desc": "選択した値をランダム並べ替え（簡易）。", "code": "Sub Shuffle()\n    Dim i As Long, j As Long, tmp As Variant, n As Long\n    n = Selection.Cells.Count\n    For i = n To 2 Step -1\n        j = Int(Rnd * i) + 1\n        tmp = Selection.Cells(i).Value\n        Selection.Cells(i).Value = Selection.Cells(j).Value\n        Selection.Cells(j).Value = tmp\n    Next i\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "今日の曜日を表示", "desc": "本日の曜日をメッセージ。", "code": "Sub WeekdayToday()\n    MsgBox Format(Date, \"aaaa\")\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "セル数を数えて表示", "desc": "選択セルの個数。", "code": "Sub CountCells()\n    MsgBox \"セル数: \" & Selection.Cells.Count\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "全シートを再計算", "desc": "ブック全体を再計算。", "code": "Sub Recalc()\n    Application.CalculateFull\nEnd Sub"}, {"cat": "便利ツール・小ネタ", "title": "処理完了を通知", "desc": "終わったらビープ＋メッセージ。", "code": "Sub DoneNotify()\n    Beep\n    MsgBox \"処理が完了しました\"\nEnd Sub"}];
const CATS = ["セル・範囲操作", "シート操作", "ブック・ファイル操作", "データ整形・クリーニング", "検索・抽出・フィルタ", "書式・見た目", "集計・計算", "自動化・繰り返し", "インポート・エクスポート", "便利ツール・小ネタ"];
let activeCat = "すべて";
let keyword = "";

// 簡易シンタックスハイライト（VBA向け・軽量）
const KW = ["Sub","End","Function","Dim","As","For","Each","Next","To","Step","If","Then","Else","ElseIf","Do","While","Loop","Until","With","Set","On","Error","Resume","GoTo","Exit","Call","True","False","Long","Integer","Double","String","Variant","Range","Boolean","Object","Application","Selection","ActiveCell","ActiveSheet","Worksheets","Sheets","ThisWorkbook","Workbooks","Cells","Rows","Columns","MsgBox","Beep"];
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function highlight(code){
  return esc(code).split("\n").map(line=>{
    // comments
    let ci = line.indexOf("'");
    let comment="";
    if(ci>=0){comment='<span class="c">'+line.slice(ci)+'</span>';line=line.slice(0,ci);}
    // strings
    line=line.replace(/"[^"]*"/g,m=>'<span class="s">'+m+'</span>');
    // keywords
    line=line.replace(/\b([A-Za-z_]+)\b/g,(m)=>KW.includes(m)?'<span class="k">'+m+'</span>':m);
    return line+comment;
  }).join("\n");
}

const listEl=document.getElementById('list');
const countEl=document.getElementById('count');
const emptyEl=document.getElementById('empty');
const catsEl=document.getElementById('cats');

// build category chips
["すべて",...CATS].forEach(c=>{
  const b=document.createElement('div');b.className='cat'+(c==="すべて"?" on":"");b.textContent=c;
  b.onclick=()=>{activeCat=c;[...catsEl.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');render();};
  catsEl.appendChild(b);
});

document.getElementById('search').addEventListener('input',e=>{keyword=e.target.value.trim();render();});

function render(){
  const kw=keyword.toLowerCase();
  const filtered=DATA.filter(x=>{
    const catOk = activeCat==="すべて" || x.cat===activeCat;
    const kwOk = !kw || (x.title+ " "+x.desc+" "+x.code+" "+x.cat).toLowerCase().includes(kw);
    return catOk && kwOk;
  });
  countEl.textContent = filtered.length+" 件";
  listEl.innerHTML="";
  emptyEl.style.display = filtered.length? "none":"block";
  filtered.forEach((x,idx)=>{
    const div=document.createElement('div');div.className='item';
    div.innerHTML=`
      <div class="ihead">
        <div class="meta">
          <div class="ititle">${esc(x.title)}</div>
          <div class="icat">${esc(x.cat)}</div>
          <div class="idesc">${esc(x.desc)}</div>
        </div>
        <button class="copy">コピー</button>
      </div>
      <div class="code"><pre>${highlight(x.code)}</pre></div>`;
    const head=div.querySelector('.ihead');
    const codeBox=div.querySelector('.code');
    const copyBtn=div.querySelector('.copy');
    head.onclick=(e)=>{ if(e.target===copyBtn)return; div.classList.toggle('open'); };
    copyBtn.onclick=async(e)=>{
      e.stopPropagation();
      try{ await navigator.clipboard.writeText(x.code); }
      catch(_){ const ta=document.createElement('textarea');ta.value=x.code;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove(); }
      copyBtn.textContent="コピー済み ✓";copyBtn.classList.add('done');
      setTimeout(()=>{copyBtn.textContent="コピー";copyBtn.classList.remove('done');},1400);
    };
    listEl.appendChild(div);
  });
}
render();
</script>
